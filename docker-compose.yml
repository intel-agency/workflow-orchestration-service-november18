services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "4096:4096"
    volumes:
      - git_repos:/workspace/git_repos
      - .memory:/workspace/.memory
    env_file:
      - .env

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - git_repos:/workspace/git_repos
    depends_on:
      server:
        condition: service_started
    env_file:
      - .env

volumes:
  git_repos:
